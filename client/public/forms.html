<!DOCTYPE html>
<html>
  <head><title>Netlify Forms</title></head>
  <body>
    <!-- Lead magnet form (Homepage) -->
    <form name="lead-magnet" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="lead-magnet" />
      <input type="email" name="email" />
      <input type="hidden" name="source" />
    </form>

    <!-- Coaching request form -->
    <form name="coaching-request" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="coaching-request" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="goal" />
      <textarea name="message"></textarea>
    </form>

    <!-- Speaking inquiry form -->
    <form name="speaking-inquiry" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="speaking-inquiry" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="organization" />
      <input type="text" name="eventDate" />
      <input type="text" name="audience" />
      <input type="text" name="topic" />
      <textarea name="message"></textarea>
    </form>

    <!-- Conference lead form -->
    <form name="conference-lead" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="conference-lead" />
      <input type="email" name="email" />
      <input type="hidden" name="source" />
    </form>
  </body>
</html>
